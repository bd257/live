<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live TV Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
background: #000000;
color:white;
overflow-x:hidden;
min-height:100vh;
}

/* PLAYER SECTION */
.player-section {
    max-width: 1200px;
    margin: 20px auto;
    padding: 0 20px;
}

.player-box{
position:relative;
width:100%;
background: #000000;
border-radius: 20px;
overflow: hidden;
box-shadow: 0 10px 30px rgba(255,0,0,0.2);
}

video{
width:100%;
height: auto;
max-height: 70vh;
background:#000000;
object-fit:contain;
}

/* CONTROLS */
.custom-controls{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
gap:20px;
z-index:999;
transition:0.3s;
background: rgba(0,0,0,0.8);
padding: 15px 25px;
border-radius: 60px;
}

.control-btn{
width:65px;
height:65px;
border:none;
border-radius:50%;
background: #ff0000;
color:white;
font-size:24px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px rgba(255,0,0,0.5);
}

.control-btn:hover{
transform:scale(1.1);
box-shadow:0 0 25px rgba(255,0,0,0.8);
}

/* CHANNEL GRID */
.channel-grid-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 20px;
}

.channel-grid{
display:grid;
grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
gap:20px;
padding:30px 0 40px;
}

/* CHANNEL CARD */
.channel{
background: #0a0a0a;
border-radius: 16px;
padding: 15px 10px;
height: auto;
min-height: 130px;
display:flex;
flex-direction: column;
justify-content:center;
align-items:center;
cursor:pointer;
border: 1px solid #222222;
transition:0.3s;
position:relative;
}

.channel:hover{
transform:translateY(-5px);
border-color: #ff0000;
box-shadow: 0 10px 25px rgba(255,0,0,0.2);
}

.channel img{
width: 80px;
height: 80px;
object-fit:contain;
border-radius: 12px;
margin-bottom: 10px;
}

.channel-name{
font-size: 12px;
text-align:center;
color: #cccccc;
margin-top: 8px;
font-weight: 500;
padding: 5px;
word-break: break-word;
}

/* ACTIVE CHANNEL */
.active{
border: 2px solid #ff0000 !important;
box-shadow: 0 0 20px rgba(255,0,0,0.4) !important;
transform:scale(1.02);
}

.active .channel-name {
    color: #ff4444;
}

/* TOP BUTTON */
#topBtn{
position:fixed;
right:20px;
bottom:30px;
z-index:99999;
display:none;
width:45px;
height:45px;
border-radius:50%;
border:none;
background: #ff0000;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px rgba(255,0,0,0.5);
}

#topBtn:hover {
    transform: scale(1.1);
}

/* LOADING MESSAGE */
.loading-msg {
    text-align: center;
    padding: 40px;
    color: #ff0000;
    font-size: 18px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .channel-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
    }
    
    .channel img {
        width: 60px;
        height: 60px;
    }
    
    .channel-name {
        font-size: 10px;
    }
    
    .control-btn {
        width: 50px;
        height: 50px;
        font-size: 18px;
    }
    
    .custom-controls {
        padding: 10px 18px;
        gap: 12px;
    }
}

@media (max-width: 480px) {
    .channel-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 10px;
    }
    
    .channel img {
        width: 50px;
        height: 50px;
    }
}

/* SCROLLBAR */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: #0a0a0a;
}

::-webkit-scrollbar-thumb {
    background: #ff0000;
    border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
    background: #cc0000;
}
</style>
</head>
<body>

<!-- PLAYER SECTION -->
<div class="player-section">
<div class="player-box">
<video id="video" autoplay playsinline controls></video>
<div class="custom-controls">
<button class="control-btn" onclick="prevChannel()">⏮</button>
<button class="control-btn" onclick="togglePlay()">⏯</button>
<button class="control-btn" onclick="nextChannel()">⏭</button>
</div>
</div>
</div>

<!-- CHANNELS -->
<div class="channel-grid-container">
<div class="channel-grid" id="channelGrid">
<div class="loading-msg">📡 Loading channels...</div>
</div>
</div>

<button id="topBtn">↑</button>

<script>
// ===========================================
// FINAL CODE - ALL ISSUES FIXED
// ===========================================

/* M3U PLAYLIST URL */
const playlist = 'https://raw.githubusercontent.com/Rakib49/Rakibiptv/refs/heads/main/aynaott.m3u';

let channels = [];
let currentIndex = 0;
let retryCount = 0;
const maxRetries = 3;

/* LOAD PLAYLIST WITH CACHE BUSTING & RETRY */
function loadPlaylist() {
    const grid = document.getElementById('channelGrid');
    grid.innerHTML = '<div class="loading-msg">📡 Loading channels... (Attempt ' + (retryCount + 1) + ')</div>';
    
    // Add timestamp to prevent caching
    const urlWithCache = playlist + '?t=' + Date.now();
    
    fetch(urlWithCache)
    .then(response => {
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        return response.text();
    })
    .then(data => {
        // Clear previous channels
        channels = [];
        
        // Parse M3U file
        const lines = data.split('\n');
        let validChannels = 0;
        
        for(let i = 0; i < lines.length; i++){
            const line = lines[i].trim();
            if(line.startsWith('#EXTINF')){
                const info = line;
                const url = lines[i+1] ? lines[i+1].trim() : '';
                
                // Skip if no URL or URL is comment
                if(!url || url.startsWith('#')) continue;
                
                // Extract channel name
                let name = 'Unknown Channel';
                const nameMatch = info.match(/,(.+)$/);
                if(nameMatch && nameMatch[1]) {
                    name = nameMatch[1].trim();
                }
                
                // Extract logo URL
                let logo = '';
                const logoMatch = info.match(/tvg-logo="([^"]*)"/);
                if(logoMatch && logoMatch[1]) {
                    logo = logoMatch[1];
                }
                
                // Only add if URL is valid
                if(url && url.startsWith('http')) {
                    channels.push({ name, url, logo });
                    validChannels++;
                }
            }
        }
        
        console.log(`✅ Loaded ${validChannels} channels`);
        
        if(channels.length === 0) {
            grid.innerHTML = '<div class="loading-msg">❌ No channels found in playlist.<br>Check your M3U file format.</div>';
            return;
        }
        
        // Render channels
        renderChannels();
        
        // Play first channel
        if(channels.length > 0){
            playChannel(0);
        }
        
        retryCount = 0; // Reset retry count on success
    })
    .catch(error => {
        console.error('Error loading playlist:', error);
        
        if(retryCount < maxRetries) {
            retryCount++;
            grid.innerHTML = `<div class="loading-msg">⚠️ Retry ${retryCount}/${maxRetries}...<br>Loading channels...</div>`;
            setTimeout(loadPlaylist, 2000);
        } else {
            grid.innerHTML = `<div class="loading-msg">❌ Failed to load channels.<br><br>
            🔧 Troubleshooting:<br>
            1. Check if M3U URL is correct<br>
            2. Make sure file is publicly accessible<br>
            3. Try opening the URL directly in browser<br><br>
            📡 URL: ${playlist.substring(0, 80)}...</div>`;
        }
    });
}

/* RENDER CHANNELS */
function renderChannels(){
    const grid = document.getElementById('channelGrid');
    grid.innerHTML = '';
    
    if(channels.length === 0) {
        grid.innerHTML = '<div class="loading-msg">❌ No channels available</div>';
        return;
    }
    
    channels.forEach((ch, idx) => {
        const div = document.createElement('div');
        div.className = 'channel';
        if(idx === currentIndex) div.classList.add('active');
        
        div.innerHTML = `
            <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/80x80?text=TV'">
            <div class="channel-name">${escapeHtml(ch.name)}</div>
        `;
        
        div.onclick = () => playChannel(idx);
        grid.appendChild(div);
    });
}

/* ESCAPE HTML TO PREVENT XSS */
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

/* PLAY CHANNEL */
function playChannel(index){
    if(index < 0 || index >= channels.length) return;
    
    currentIndex = index;
    const video = document.getElementById('video');
    const channel = channels[index];
    
    // Show which channel is playing in console
    console.log(`🎬 Playing: ${channel.name}`);
    
    // Destroy existing HLS instance
    if(window.hls) {
        window.hls.destroy();
        window.hls = null;
    }
    
    // Check if URL is HLS (.m3u8)
    if(channel.url.includes('.m3u8') || Hls.isSupported()) {
        if(Hls.isSupported()) {
            window.hls = new Hls({
                debug: false,
                enableWorker: true,
                lowLatencyMode: true
            });
            window.hls.loadSource(channel.url);
            window.hls.attachMedia(video);
            window.hls.on(Hls.Events.MANIFEST_PARSED, function(){
                video.play().catch(e => console.log('Auto-play blocked:', e));
            });
            window.hls.on(Hls.Events.ERROR, function(event, data) {
                if(data.fatal) {
                    console.error('HLS Error:', data);
                    // Try to play next channel if stream fails
                    if(data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                        setTimeout(() => {
                            if(currentIndex === index) {
                                console.log('Stream failed, trying next channel...');
                                nextChannel();
                            }
                        }, 3000);
                    }
                }
            });
        } else if(video.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari native HLS
            video.src = channel.url;
            video.play().catch(e => console.log('Play error:', e));
        } else {
            console.error('HLS not supported');
        }
    } else {
        // Direct stream (MP4, etc.)
        video.src = channel.url;
        video.play().catch(e => console.log('Play error:', e));
    }
    
    // Update active class
    document.querySelectorAll('.channel').forEach((el, i) => {
        el.classList.remove('active');
        if(i === index) el.classList.add('active');
    });
    
    // Scroll to active channel
    setTimeout(() => {
        const activeChannel = document.querySelector('.channel.active');
        if(activeChannel) {
            activeChannel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }, 100);
}

/* NEXT CHANNEL */
function nextChannel(){
    let newIndex = currentIndex + 1;
    if(newIndex >= channels.length) newIndex = 0;
    playChannel(newIndex);
}

/* PREVIOUS CHANNEL */
function prevChannel(){
    let newIndex = currentIndex - 1;
    if(newIndex < 0) newIndex = channels.length - 1;
    playChannel(newIndex);
}

/* TOGGLE PLAY/PAUSE */
function togglePlay(){
    const video = document.getElementById('video');
    if(video.paused){
        video.play();
    } else {
        video.pause();
    }
}

/* AUTO HIDE CONTROLS */
const controls = document.querySelector('.custom-controls');
let hideTimeout;

function showUI(){
    controls.style.opacity = '1';
    if(hideTimeout) clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => {
        controls.style.opacity = '0';
    }, 2000);
}

showUI();

// Show controls on mouse move or click
document.querySelector('.player-box').addEventListener('click', () => showUI());
document.querySelector('.player-box').addEventListener('mousemove', () => showUI());

/* TOP BUTTON - SCROLL TO TOP */
document.getElementById('topBtn').onclick = () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.addEventListener('scroll', () => {
    const btn = document.getElementById('topBtn');
    if(btn) {
        btn.style.display = window.scrollY > 300 ? 'block' : 'none';
    }
});

/* KEYBOARD SHORTCUTS */
document.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowLeft') {
        e.preventDefault();
        prevChannel();
    } else if(e.key === 'ArrowRight') {
        e.preventDefault();
        nextChannel();
    } else if(e.key === ' ' || e.key === 'Space') {
        e.preventDefault();
        togglePlay();
    }
});

/* INITIALIZE */
loadPlaylist();

// Force reload when page becomes visible (for mobile)
document.addEventListener('visibilitychange', () => {
    if(!document.hidden) {
        // Optional: refresh playlist when returning to page
        // loadPlaylist();
    }
});

</script>
</body>
</html>
