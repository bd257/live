<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
background: #000000;
color:white;
overflow-x:hidden;
min-height:100vh;
}


/* PLAYER SECTION */
.player-section {
    max-width: 1200px;
    margin: 20px auto;
    padding: 0 20px;
}

.player-box{
position:relative;
width:100%;
background: #000000;
border-radius: 20px;
overflow: hidden;
box-shadow: 0 10px 30px rgba(255,0,0,0.2);
}

video{
width:100%;
height: auto;
max-height: 70vh;
background:#000000;
object-fit:contain;
}

/* CONTROLS */
.custom-controls{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
gap:20px;
z-index:999;
transition:0.3s;
background: rgba(0,0,0,0.8);
padding: 15px 25px;
border-radius: 60px;
}

.control-btn{
width:65px;
height:65px;
border:none;
border-radius:50%;
background: #ff0000;
color:white;
font-size:24px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px rgba(255,0,0,0.5);
}

.control-btn:hover{
transform:scale(1.1);
box-shadow:0 0 25px rgba(255,0,0,0.8);
}

/* SEARCH */
.search-container {
    max-width: 600px;
    margin: 20px auto;
    padding: 0 20px;
}

.search-box input{
width:100%;
padding:14px 20px;
font-size:16px;
border:none;
outline:none;
border-radius: 50px;
background: #111111;
color:white;
border: 1px solid #333333;
transition:0.3s;
}

.search-box input:focus{
border-color: #ff0000;
box-shadow: 0 0 15px rgba(255,0,0,0.3);
}

/* CHANNEL GRID */
.channel-grid-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 20px;
}

.channel-grid{
display:grid;
grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
gap:20px;
padding:20px 0 40px;
}

/* CHANNEL CARD */
.channel{
background: #0a0a0a;
border-radius: 16px;
padding: 15px 10px;
height: auto;
min-height: 130px;
display:flex;
flex-direction: column;
justify-content:center;
align-items:center;
cursor:pointer;
border: 1px solid #222222;
transition:0.3s;
position:relative;
}

.channel:hover{
transform:translateY(-5px);
border-color: #ff0000;
box-shadow: 0 10px 25px rgba(255,0,0,0.2);
}

.channel img{
width: 80px;
height: 80px;
object-fit:contain;
border-radius: 12px;
margin-bottom: 10px;
}

.channel-name{
font-size: 12px;
text-align:center;
color: #cccccc;
margin-top: 8px;
font-weight: 500;
padding: 5px;
}

/* ACTIVE CHANNEL */
.active{
border: 2px solid #ff0000 !important;
box-shadow: 0 0 20px rgba(255,0,0,0.4) !important;
transform:scale(1.02);
}

.active .channel-name {
    color: #ff4444;
}

/* TOP BUTTON */
#topBtn{
position:fixed;
right:20px;
bottom:30px;
z-index:99999;
display:none;
width:45px;
height:45px;
border-radius:50%;
border:none;
background: #ff0000;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px rgba(255,0,0,0.5);
}

#topBtn:hover {
    transform: scale(1.1);
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .channel-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
    }
    
    .channel img {
        width: 60px;
        height: 60px;
    }
    
    .channel-name {
        font-size: 10px;
    }
    
    .control-btn {
        width: 50px;
        height: 50px;
        font-size: 18px;
    }
    
    .custom-controls {
        padding: 10px 18px;
        gap: 12px;
    }
}

@media (max-width: 480px) {
    .channel-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 10px;
    }
    
    .channel img {
        width: 50px;
        height: 50px;
    }
}

/* SCROLLBAR */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: #0a0a0a;
}

::-webkit-scrollbar-thumb {
    background: #ff0000;
    border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
    background: #cc0000;
}

</style>

</head>

<body>



<!-- PLAYER SECTION -->
<div class="player-section">
<div class="player-box">
<video id="video" autoplay playsinline controls></video>
<div class="custom-controls">
<button class="control-btn" onclick="prevChannel()">⏮</button>
<button class="control-btn" onclick="togglePlay()">⏯</button>
<button class="control-btn" onclick="nextChannel()">⏭</button>
</div>
</div>
</div>

<!-- SEARCH -->
<div class="search-container">
<div class="search-box">
<input type="text" id="search" placeholder="🔍 Search channels..." onkeyup="searchChannels()">
</div>
</div>

<!-- CHANNELS -->
<div class="channel-grid-container">
<div class="channel-grid" id="channelGrid"></div>
</div>

<button id="topBtn">↑</button>

<script>

/* PLAYLIST */
const playlist = 'https://raw.githubusercontent.com/Rakib49/Rakibiptv/refs/heads/main/aynaott.m3u';

let channels = [];
let filteredChannels = [];
let currentIndex = 0;

/* LOAD PLAYLIST */
fetch(playlist)
.then(r => r.text())
.then(data => {
    const lines = data.split('\n');
    
    for(let i = 0; i < lines.length; i++){
        if(lines[i].startsWith('#EXTINF')){
            const info = lines[i];
            const url = lines[i+1];
            const name = info.split(',')[1];
            let logo = '';
            const match = info.match(/tvg-logo="(.*?)"/);
            if(match){ logo = match[1]; }
            
            channels.push({ name, url, logo });
        }
    }
    
    filteredChannels = channels;
    renderChannels();
    
    if(channels.length > 0){
        playChannel(0);
    }
});

function renderChannels(){
    const grid = document.getElementById('channelGrid');
    grid.innerHTML = '';
    
    filteredChannels.forEach((ch, index) => {
        const div = document.createElement('div');
        div.className = 'channel';
        
        div.innerHTML = `
            <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/80x80?text=TV'">
            <div class="channel-name">${ch.name}</div>
        `;
        
        div.onclick = () => playChannel(channels.findIndex(c => c.url === ch.url));
        grid.appendChild(div);
    });
}

function playChannel(index){
    if(index < 0 || index >= channels.length) return;
    
    currentIndex = index;
    const video = document.getElementById('video');
    const channel = channels[index];
    
    if(Hls.isSupported()){
        if(window.hls) window.hls.destroy();
        const hls = new Hls();
        hls.loadSource(channel.url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function(){
            video.play();
        });
        window.hls = hls;
    } else {
        video.src = channel.url;
        video.play();
    }
    
    // Update active class
    document.querySelectorAll('.channel').forEach(el => {
        el.classList.remove('active');
    });
    const cards = document.querySelectorAll('.channel');
    const filteredIndex = filteredChannels.findIndex(c => c.url === channel.url);
    if(cards[filteredIndex]) cards[filteredIndex].classList.add('active');
}

function nextChannel(){
    let newIndex = currentIndex + 1;
    if(newIndex >= channels.length) newIndex = 0;
    playChannel(newIndex);
}

function prevChannel(){
    let newIndex = currentIndex - 1;
    if(newIndex < 0) newIndex = channels.length - 1;
    playChannel(newIndex);
}

function togglePlay(){
    const video = document.getElementById('video');
    if(video.paused){
        video.play();
    } else {
        video.pause();
    }
}

function searchChannels(){
    const input = document.getElementById('search').value.toLowerCase();
    filteredChannels = channels.filter(ch => ch.name.toLowerCase().includes(input));
    renderChannels();
    
    // Try to keep current channel active if still visible
    const currentChannel = channels[currentIndex];
    const stillVisible = filteredChannels.some(ch => ch.url === currentChannel?.url);
    if(!stillVisible && filteredChannels.length > 0){
        const newIndex = channels.findIndex(ch => ch.url === filteredChannels[0].url);
        playChannel(newIndex);
    }
}

// Auto hide controls
const controls = document.querySelector('.custom-controls');
let hideTimeout;

function showUI(){
    controls.style.opacity = '1';
    if(hideTimeout) clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => {
        controls.style.opacity = '0';
    }, 2000);
}

showUI();
document.querySelector('.player-box').addEventListener('click', () => showUI());
document.querySelector('.player-box').addEventListener('mousemove', () => showUI());

// Top button
document.getElementById('topBtn').onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});
window.addEventListener('scroll', () => {
    document.getElementById('topBtn').style.display = window.scrollY > 300 ? 'block' : 'none';
});

</script>

</body>
</html>
