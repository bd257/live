<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>FIFA · Live TV</title>
  <!-- hls.js for HLS streaming -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background: #000;
      color: #eee;
      overflow-x: hidden;
    }
    .player-wrapper {
      max-width: 100%;
      margin: 0;
      padding: 0;
      background: #000;
    }
    .player-box {
      position: relative;
      width: 100%;
      background: #000;
    }
    video {
      width: 100%;
      height: auto;
      max-height: 60vh;
      background: #000;
      display: block;
      aspect-ratio: 16 / 9;
      object-fit: contain;
    }
    /* minimal floating controls */
    .custom-controls {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      padding: 6px 16px;
      border-radius: 40px;
      z-index: 20;
      transition: opacity 0.3s ease;
    }
    .control-btn {
      background: transparent;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 18px;
      color: rgba(255,255,255,0.9);
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .control-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }
    .search-area {
      max-width: 600px;
      margin: 14px auto 10px;
      padding: 0 16px;
    }
    .search-box {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 30px;
      padding: 10px 18px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: 0.2s;
    }
    .search-box:focus {
      border-color: #4ade80;
    }
    .channel-container {
      max-width: 100%;
      margin: 0 auto;
      padding: 12px 16px 80px;
    }
    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .channel-card {
      background: #0a0a0a;
      padding: 16px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
      border: 1px solid #1f1f1f;
      border-radius: 16px;
      transition: all 0.2s ease;
      position: relative;
    }
    .channel-card:hover {
      background: #141414;
      border-color: #444;
      transform: translateY(-2px);
    }
    .channel-card.active {
      background: #1a1a1a;
      border: 2px solid #4ade80;
      box-shadow: 0 0 18px rgba(74,222,128,0.15);
    }
    .channel-card.offline {
      opacity: 0.5;
    }
    .channel-name {
      font-size: 13px;
      font-weight: 500;
      color: #eee;
      line-height: 1.4;
      word-break: break-word;
      margin-bottom: 4px;
    }
    .channel-group {
      font-size: 10px;
      color: #666;
    }
    .status-badge {
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 12px;
      margin-top: 6px;
      display: inline-block;
    }
    .status-badge.playing {
      color: #4ade80;
      background: rgba(74,222,128,0.12);
    }
    .status-badge.offline {
      color: #ef4444;
      background: rgba(239,68,68,0.12);
    }
    .section-title {
      grid-column: 1 / -1;
      padding: 12px 12px 6px 12px;
      font-size: 13px;
      font-weight: 600;
      color: #4ade80;
      letter-spacing: 0.3px;
      border-bottom: 1px solid #2a2a2a;
      margin-top: 14px;
    }
    .section-title.offline-title {
      color: #ef4444;
    }
    .section-title:first-of-type {
      margin-top: 0;
    }
    .status-message {
      text-align: center;
      padding: 48px 20px;
      color: #888;
      background: #000;
      font-size: 14px;
      grid-column: 1 / -1;
    }
    .loading-dots::after {
      content: ' ...';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots { 0% { content: ' .'; } 33% { content: ' ..'; } 66% { content: ' ...'; } }
    .channel-stats {
      text-align: center;
      font-size: 11px;
      color: #555;
      padding: 6px 16px 4px;
      letter-spacing: 0.3px;
    }
    .site-footer {
      background: linear-gradient(180deg, #050505, #000);
      border-top: 1px solid #1a1a1a;
      padding: 20px 16px 30px;
      margin-top: 10px;
      text-align: center;
    }
    .footer-content {
      max-width: 600px;
      margin: 0 auto;
    }
    .footer-text {
      font-size: 11px;
      color: #555;
      margin-bottom: 8px;
      letter-spacing: 0.4px;
    }
    .footer-link {
      color: #666;
      text-decoration: none;
      font-size: 11px;
      transition: color 0.2s;
    }
    .footer-link:hover {
      color: #4ade80;
    }
    .footer-divider {
      width: 40px;
      height: 1px;
      background: #2a2a2a;
      margin: 10px auto;
    }
    #goTopBtn {
      position: fixed;
      right: 16px;
      bottom: 24px;
      background: rgba(30,30,30,0.8);
      backdrop-filter: blur(8px);
      border: none;
      color: #ccc;
      width: 40px;
      height: 40px;
      border-radius: 20px;
      font-size: 18px;
      cursor: pointer;
      display: none;
      z-index: 99;
    }
    #goTopBtn:hover {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    @media (max-width: 640px) {
      .channel-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
      .channel-name { font-size: 12px; }
      .control-btn { width: 36px; height: 36px; font-size: 16px; }
      .custom-controls { gap: 8px; padding: 6px 14px; }
    }
    @media (max-width: 480px) {
      .channel-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
      .channel-name { font-size: 11px; }
    }
  </style>
</head>
<body>
<div class="player-wrapper">
  <div class="player-box">
    <video id="videoPlayer" autoplay playsinline controls></video>
    <div class="custom-controls" id="customControls">
      <button class="control-btn" id="prevBtn">◀</button>
      <button class="control-btn" id="playPauseBtn">▶</button>
      <button class="control-btn" id="nextBtn">▶</button>
    </div>
  </div>
</div>

<div class="search-area">
  <input type="text" id="searchInput" class="search-box" placeholder="Search channels..." autocomplete="off">
</div>

<div class="channel-container">
  <div class="channel-grid" id="channelGrid">
    <div class="status-message">Loading channels<span class="loading-dots"></span></div>
  </div>
</div>
<div id="channelStats" class="channel-stats"></div>

<footer class="site-footer">
  <div class="footer-content">
    <div class="footer-divider"></div>
    <div class="footer-text">Source: <a href="#" class="footer-link">fifa.m3u</a></div>
    <div class="footer-text">All streams are provided by the playlist owner</div>
  </div>
</footer>
<button id="goTopBtn">↑</button>

<script>
  (function() {
    // ----- SINGLE M3U: fifa.m3u (no featured logic) -----
    const PLAYLIST_URL = "https://raw.githubusercontent.com/bd257/live/refs/heads/main/fifa.m3u";

    let masterChannels = [];
    let filteredChannels = [];
    let currentIndex = 0;
    let currentHls = null;
    let isLoading = false;
    let channelStatus = new Map(); // url -> true=offline
    let cardCache = new Map();

    const video = document.getElementById('videoPlayer');
    const channelGrid = document.getElementById('channelGrid');
    const searchInput = document.getElementById('searchInput');
    const statsSpan = document.getElementById('channelStats');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const topBtn = document.getElementById('goTopBtn');
    const controlsDiv = document.getElementById('customControls');

    // ----- helpers -----
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    function getGroup(infoLine) {
      const m = infoLine.match(/group-title="([^"]*)"/i);
      return m ? m[1] : '';
    }

    // parse m3u content
    function parseM3U(text) {
      const lines = text.split(/\r?\n/);
      const channels = [];
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('#EXTINF')) {
          const info = line;
          const urlLine = (i + 1 < lines.length) ? lines[i + 1].trim() : '';
          if (!urlLine || urlLine.startsWith('#')) continue;
          let name = 'Unknown';
          const nameMatch = info.match(/,(.+)$/);
          if (nameMatch && nameMatch[1]) name = nameMatch[1].trim();
          const group = getGroup(info);
          if (urlLine.startsWith('http')) {
            channels.push({ name, url: urlLine, group, source: 'fifa.m3u' });
          }
        }
      }
      return channels;
    }

    // quick offline test (HEAD)
    async function testOffline(channel) {
      if (channelStatus.has(channel.url)) return channelStatus.get(channel.url);
      channelStatus.set(channel.url, false);
      try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 3000);
        await fetch(channel.url, { method: 'HEAD', mode: 'no-cors', signal: ctrl.signal });
        clearTimeout(timer);
        channelStatus.set(channel.url, false);
        return false;
      } catch (_) {
        channelStatus.set(channel.url, true);
        return true;
      }
    }

    // simple alphabetical sort (no priority / featured)
    function sortChannels(channels, activeUrl) {
      const sorted = [...channels];
      sorted.sort((a, b) => a.name.localeCompare(b.name));
      // move active channel to top if present
      const idx = sorted.findIndex(ch => ch.url === activeUrl);
      if (idx > 0) {
        const [active] = sorted.splice(idx, 1);
        sorted.unshift(active);
      }
      return sorted;
    }

    // get or create card element with cache
    function getCard(channel, isActive, isOffline) {
      if (cardCache.has(channel.url)) {
        const el = cardCache.get(channel.url);
        el.classList.toggle('active', isActive);
        el.classList.toggle('offline', isOffline);
        const badge = el.querySelector('.status-badge');
        if (isOffline) {
          if (!badge) {
            const b = document.createElement('div');
            b.className = 'status-badge offline';
            b.textContent = '● Offline';
            el.appendChild(b);
          } else {
            badge.textContent = '● Offline';
            badge.className = 'status-badge offline';
          }
        } else if (isActive) {
          if (!badge) {
            const b = document.createElement('div');
            b.className = 'status-badge playing';
            b.textContent = '● Playing';
            el.appendChild(b);
          } else {
            badge.textContent = '● Playing';
            badge.className = 'status-badge playing';
          }
        } else {
          if (badge) badge.remove();
        }
        return el;
      }

      const div = document.createElement('div');
      div.className = 'channel-card';
      if (isActive) div.classList.add('active');
      if (isOffline) div.classList.add('offline');

      div.innerHTML = `
        <div class="channel-name">${escapeHtml(channel.name)}</div>
        ${channel.group ? `<div class="channel-group">${escapeHtml(channel.group)}</div>` : ''}
        ${isOffline ? '<div class="status-badge offline">● Offline</div>' : (isActive ? '<div class="status-badge playing">● Playing</div>' : '')}
      `;
      div.addEventListener('click', () => {
        const idx = masterChannels.findIndex(c => c.url === channel.url);
        if (idx !== -1) playChannel(idx);
      });
      cardCache.set(channel.url, div);
      return div;
    }

    // render grid with sections: Available / Offline
    function renderGrid(autoScroll = false) {
      if (!channelGrid) return;
      if (filteredChannels.length === 0) {
        channelGrid.innerHTML = `<div class="status-message">No channels found</div>`;
        return;
      }

      const activeUrl = masterChannels[currentIndex]?.url;
      // split online / offline based on status map
      const online = [];
      const offline = [];
      filteredChannels.forEach(ch => {
        const off = channelStatus.get(ch.url) || false;
        if (off) offline.push(ch);
        else online.push(ch);
      });

      // sort online alphabetically (no featured)
      const sortedOnline = sortChannels(online, activeUrl);
      // sort offline alphabetically
      offline.sort((a,b) => a.name.localeCompare(b.name));

      const fragment = document.createDocumentFragment();

      if (sortedOnline.length) {
        const title = document.createElement('div');
        title.className = 'section-title';
        title.innerHTML = `🟢 AVAILABLE · ${sortedOnline.length}`;
        fragment.appendChild(title);
        sortedOnline.forEach(ch => {
          const active = ch.url === activeUrl;
          const card = getCard(ch, active, false);
          fragment.appendChild(card);
        });
      }

      if (offline.length) {
        const title = document.createElement('div');
        title.className = 'section-title offline-title';
        title.innerHTML = `⚫ OFFLINE · ${offline.length}`;
        fragment.appendChild(title);
        offline.forEach(ch => {
          const card = getCard(ch, false, true);
          fragment.appendChild(card);
        });
      }

      const scrollY = window.scrollY;
      channelGrid.innerHTML = '';
      channelGrid.appendChild(fragment);
      if (!autoScroll) window.scrollTo(0, scrollY);

      const total = masterChannels.length;
      const onlineCount = sortedOnline.length;
      const offlineCount = offline.length;
      statsSpan.innerText = `${onlineCount} available · ${offlineCount} offline · ${total} total`;

      if (autoScroll) {
        setTimeout(() => {
          const activeCard = document.querySelector('.channel-card.active');
          if (activeCard) activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 120);
      }
    }

    // load single playlist
    async function loadPlaylist() {
      channelGrid.innerHTML = `<div class="status-message">Loading channels<span class="loading-dots"></span></div>`;
      masterChannels = [];
      cardCache.clear();
      channelStatus.clear();

      try {
        const resp = await fetch(PLAYLIST_URL + '?t=' + Date.now());
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const text = await resp.text();
        const parsed = parseM3U(text);
        console.log(`Loaded ${parsed.length} channels from fifa.m3u`);

        // dedup by url
        const map = new Map();
        parsed.forEach(ch => { if (!map.has(ch.url)) map.set(ch.url, ch); });
        masterChannels = Array.from(map.values());
      } catch (err) {
        console.warn('Failed to load playlist:', err);
        channelGrid.innerHTML = `<div class="status-message">Failed to load playlist</div>`;
        return false;
      }

      if (masterChannels.length === 0) {
        channelGrid.innerHTML = `<div class="status-message">No channels in playlist</div>`;
        statsSpan.innerText = '0 channels';
        return false;
      }

      // initial offline detection
      filteredChannels = [...masterChannels];
      renderGrid(false);

      // test each channel asynchronously
      const testPromises = masterChannels.map(ch => testOffline(ch));
      await Promise.all(testPromises);
      renderGrid(false);

      // play first channel (no priority)
      playChannel(0);
      return true;
    }

    // play channel by index
    function playChannel(index) {
      if (!masterChannels.length || index < 0 || index >= masterChannels.length) return;
      if (isLoading) return;
      isLoading = true;

      currentIndex = index;
      const channel = masterChannels[currentIndex];
      if (!channel || !channel.url) { isLoading = false; return; }

      if (currentHls) {
        currentHls.destroy();
        currentHls = null;
      }

      // if marked offline, try to clear (maybe it's back)
      if (channelStatus.get(channel.url) === true) {
        channelStatus.set(channel.url, false);
      }

      renderGrid(true);

      const url = channel.url;
      const isHLS = url.includes('.m3u8') || url.includes('m3u8');

      if (isHLS && Hls.isSupported()) {
        currentHls = new Hls({ debug: false, enableWorker: true, lowLatencyMode: true });
        currentHls.loadSource(url);
        currentHls.attachMedia(video);
        currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(() => {});
          isLoading = false;
        });
        currentHls.on(Hls.Events.ERROR, (ev, data) => {
          if (data.fatal) {
            console.warn('HLS fatal error, marking offline');
            channelStatus.set(channel.url, true);
            renderGrid(false);
            nextChannel();
          }
          isLoading = false;
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl') && isHLS) {
        video.src = url;
        video.play().catch(() => {});
        isLoading = false;
      } else {
        video.src = url;
        video.play().catch(() => {
          channelStatus.set(channel.url, true);
          renderGrid(false);
        });
        isLoading = false;
      }
      document.title = `${channel.name} · FIFA TV`;
    }

    function nextChannel() {
      if (!masterChannels.length) return;
      let idx = currentIndex + 1;
      let attempts = 0;
      while (attempts < masterChannels.length) {
        if (idx >= masterChannels.length) idx = 0;
        const off = channelStatus.get(masterChannels[idx]?.url) || false;
        if (!off) break;
        idx++;
        attempts++;
      }
      playChannel(idx);
    }

    function prevChannel() {
      if (!masterChannels.length) return;
      let idx = currentIndex - 1;
      let attempts = 0;
      while (attempts < masterChannels.length) {
        if (idx < 0) idx = masterChannels.length - 1;
        const off = channelStatus.get(masterChannels[idx]?.url) || false;
        if (!off) break;
        idx--;
        attempts++;
      }
      playChannel(idx);
    }

    function togglePlayPause() {
      if (video.paused) video.play().catch(() => {});
      else video.pause();
    }

    function applySearch() {
      const term = searchInput.value.trim().toLowerCase();
      if (!term) filteredChannels = [...masterChannels];
      else filteredChannels = masterChannels.filter(ch => ch.name.toLowerCase().includes(term));
      renderGrid(false);
      // if current channel not in filtered, play first
      const still = filteredChannels.some(ch => ch.url === masterChannels[currentIndex]?.url);
      if (!still && filteredChannels.length) {
        const newIdx = masterChannels.findIndex(ch => ch.url === filteredChannels[0].url);
        if (newIdx !== -1) playChannel(newIdx);
      }
    }

    // controls visibility
    let hideTimer;
    function resetHide() { if (controlsDiv) controlsDiv.style.opacity = '1'; clearTimeout(hideTimer); hideTimer = setTimeout(() => { if (controlsDiv) controlsDiv.style.opacity = '0'; }, 2500); }
    function showControls() { resetHide(); }

    // event listeners
    prevBtn.addEventListener('click', () => { prevChannel(); showControls(); });
    nextBtn.addEventListener('click', () => { nextChannel(); showControls(); });
    playPauseBtn.addEventListener('click', () => { togglePlayPause(); showControls(); });
    document.querySelector('.player-box')?.addEventListener('click', showControls);
    video.addEventListener('play', showControls);
    video.addEventListener('pause', showControls);
    searchInput.addEventListener('input', applySearch);

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') { prevChannel(); e.preventDefault(); showControls(); }
      else if (e.key === 'ArrowRight') { nextChannel(); e.preventDefault(); showControls(); }
      else if (e.key === ' ' || e.key === 'Space') { togglePlayPause(); e.preventDefault(); showControls(); }
    });

    window.addEventListener('scroll', () => {
      topBtn.style.display = window.scrollY > 300 ? 'flex' : 'none';
    });
    topBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // start
    loadPlaylist();
    resetHide();
    setTimeout(() => { if (controlsDiv) controlsDiv.style.opacity = '0'; }, 3000);
  })();
</script>
</body>
</html>
