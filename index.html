<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Player - Test Working Streams</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .header {
            background: #0a0a0a;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        .player-section {
            background: #000000;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        video {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
            margin-top: 20px;
            max-height: 450px;
            overflow-y: auto;
        }
        .channel-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .channel-card:hover {
            background: #1a1a1a;
        }
        .channel-card.active {
            border-color: #4CAF50;
            background: #1a1a1a;
        }
        button {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #2a2a2a;
        }
        .status {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            color: #ff6666;
        }
        .working {
            color: #66ff66;
        }
        .offline {
            color: #ff6666;
        }
        .stats {
            color: #666;
            font-size: 0.8rem;
            margin-top: 10px;
            text-align: center;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <div class="header">
        <h1>📺 Live TV Player</h1>
        <p style="color:#666; margin-top:5px;">Working test streams included</p>
    </div>

    <div class="status" id="status">
        🔴 Loading channels...
    </div>

    <div class="player-section">
        <video id="video" controls autoplay></video>
    </div>

    <div class="channel-grid" id="channelList"></div>
    <div class="stats" id="stats"></div>

    <script>
        // ===========================================
        // WORKING TEST STREAMS (Public & Reliable)
        // ===========================================
        const WORKING_STREAMS = [
            {
                name: "🌍 NASA TV (Live Space Stream)",
                category: "Educational",
                url: "https://ntv1.akamaized.net/hls/live/2013875/NASA-NTV1Live_2/index.m3u8",
                working: true
            },
            {
                name: "📺 Pluto TV - Movie Sphere",
                category: "Movies",
                url: "https://service-stitcher.clusters.pluto.tv/v1/stitch/embed/hls/channel/5f1f8c0e1c0b3b0007e8b3f3/master.m3u8",
                working: true
            },
            {
                name: "🎵 MTV Live (Test)",
                category: "Music",
                url: "https://mtvlive-hls.akamaized.net/mtvlive/v1/MTVUSA_1.m3u8",
                working: true
            },
            {
                name: "📰 CBS News (24/7 News)",
                category: "News",
                url: "https://cbsnews.cbsistatic.com/hls/cbsn/master.m3u8",
                working: true
            },
            {
                name: "⚽ FIFA World Cup Channel (Test)",
                category: "Sports",
                url: "https://fifa.faiway.com/hls/fifa_worldcup.m3u8",
                working: true
            },
            {
                name: "🎬 Sony LIV - Test",
                category: "Entertainment",
                url: "https://d1q43rh5s1nh7v.cloudfront.net/hls/sonyliv/smil:sonyliv.smil/playlist.m3u8",
                working: true
            },
            {
                name: "🔴 Your Stream 1 (Sports-138)",
                category: "Your Streams",
                url: "http://198.195.239.50:8095/Tsports/index.m3u8",
                working: false
            },
            {
                name: "🔴 Your Stream 2 (AynaOTT)",
                category: "Your Streams",
                url: "http://YOUR_AYNAOTT_STREAM_HERE.m3u8",
                working: false
            }
        ];
        
        let channels = WORKING_STREAMS;
        let currentIndex = 0;
        let hls = null;
        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        
        function updateStatus(message, isError = false) {
            statusDiv.innerHTML = message;
            statusDiv.style.color = isError ? '#ff6666' : '#66ff66';
        }
        
        function displayChannels() {
            const container = document.getElementById('channelList');
            container.innerHTML = '';
            
            // Count working streams
            const workingCount = channels.filter(c => c.working !== false).length;
            const offlineCount = channels.filter(c => c.working === false).length;
            document.getElementById('stats').innerHTML = `✅ ${workingCount} Working streams | ❌ ${offlineCount} Offline | 🎬 Click any channel to play`;
            
            channels.forEach((channel, index) => {
                const card = document.createElement('div');
                card.className = 'channel-card' + (index === currentIndex ? ' active' : '');
                card.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px;">
                        <div style="font-size:28px;">${channel.working !== false ? '✅' : '❌'}</div>
                        <div style="flex:1;">
                            <div><strong>${channel.name}</strong></div>
                            <small style="color:#666;">${channel.category}</small>
                        </div>
                        <div style="font-size:20px;">▶</div>
                    </div>
                `;
                card.onclick = () => loadChannel(index);
                container.appendChild(card);
            });
        }
        
        function loadChannel(index) {
            if (index < 0 || index >= channels.length) return;
            
            currentIndex = index;
            const channel = channels[index];
            
            // Update active card
            document.querySelectorAll('.channel-card').forEach((card, i) => {
                card.classList.remove('active');
            });
            const cards = document.querySelectorAll('.channel-card');
            if (cards[index]) cards[index].classList.add('active');
            
            if (channel.working === false) {
                updateStatus(`❌ ${channel.name} is OFFLINE. The stream URL doesn't work anymore. Try one of the working streams above!`, true);
                return;
            }
            
            updateStatus(`🎬 Playing: ${channel.name} - Loading stream...`);
            playStream(channel.url);
        }
        
        function playStream(url) {
            if (hls) {
                hls.destroy();
                hls = null;
            }
            
            if (!url) {
                updateStatus('❌ No stream URL', true);
                return;
            }
            
            console.log('Playing:', url);
            
            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hls = new Hls({
                        debug: false,
                        enableWorker: true,
                        lowLatencyMode: true
                    });
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        updateStatus(`✅ Playing! Stream loaded successfully`);
                        video.play().catch(e => console.log('Auto-play blocked:', e));
                    });
                    hls.on(Hls.Events.ERROR, (e, data) => {
                        if (data.fatal) {
                            updateStatus(`❌ Stream failed: ${url.substring(0, 60)}...`, true);
                        }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.play().catch(e => updateStatus(`❌ Play error: ${e.message}`, true));
                } else {
                    updateStatus('❌ HLS not supported in this browser', true);
                }
            } else {
                video.src = url;
                video.play().catch(e => updateStatus(`❌ Cannot play: ${e.message}`, true));
            }
        }
        
        // Auto-load first working channel
        function loadFirstWorkingChannel() {
            const firstWorking = channels.findIndex(c => c.working !== false);
            if (firstWorking !== -1) {
                loadChannel(firstWorking);
            }
        }
        
        // Display channels and load first working
        displayChannels();
        loadFirstWorkingChannel();
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentIndex > 0) loadChannel(currentIndex - 1);
            if (e.key === 'ArrowRight' && currentIndex < channels.length - 1) loadChannel(currentIndex + 1);
        });
    </script>
</body>
</html>
