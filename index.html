<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Live TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body {
    background: #000000;
    color: #ffffff;
    overflow-x: hidden;
}

/* NO HEADER - removed completely */

/* Player Section - Minimal */
.player-wrapper {
    max-width: 100%;
    margin: 0;
    padding: 0;
}
.player-box {
    position: relative;
    background: #000000;
    width: 100%;
}
video {
    width: 100%;
    height: auto;
    max-height: 60vh;
    background: #000000;
    display: block;
    aspect-ratio: 16 / 9;
    object-fit: contain;
}

/* Minimal Controls - No Red Buttons */
.custom-controls {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    padding: 8px 16px;
    border-radius: 40px;
    z-index: 20;
    transition: opacity 0.3s ease;
}
.control-btn {
    background: transparent;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 18px;
    color: rgba(255,255,255,0.9);
    cursor: pointer;
    transition: 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}
.control-btn:hover {
    background: rgba(255,255,255,0.15);
    color: white;
}

/* Search - Minimal */
.search-area {
    max-width: 600px;
    margin: 16px auto 12px;
    padding: 0 16px;
}
.search-box {
    width: 100%;
    background: #111111;
    border: 1px solid #2a2a2a;
    border-radius: 30px;
    padding: 10px 18px;
    color: white;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
}
.search-box:focus {
    border-color: #666;
}

/* Channel Grid - Text Only */
.channel-container {
    max-width: 100%;
    margin: 0 auto;
    padding: 12px 16px 80px;
}
.channel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
}
.channel-card {
    background: #0a0a0a;
    border-radius: 12px;
    padding: 14px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    cursor: pointer;
    border: 1px solid #1f1f1f;
    transition: all 0.2s ease;
}
.channel-card:hover {
    background: #141414;
    border-color: #444;
}
.channel-card.active {
    border: 1px solid #ffffff;
    background: #1a1a1a;
}
.channel-name {
    font-size: 13px;
    font-weight: 500;
    color: #eeeeee;
    line-height: 1.4;
    word-break: break-word;
}
.channel-group {
    font-size: 10px;
    color: #666666;
    margin-top: 6px;
}

/* Status Messages */
.status-message {
    text-align: center;
    padding: 48px 20px;
    color: #888;
    background: #000;
    font-size: 14px;
}
.loading-dots::after {
    content: ' ...';
    animation: dots 1.2s steps(3, end) infinite;
}
@keyframes dots { 0% { content: ' .'; } 33% { content: ' ..'; } 66% { content: ' ...'; } }

/* Scroll to Top - Minimal */
#goTopBtn {
    position: fixed;
    right: 16px;
    bottom: 24px;
    background: rgba(30,30,30,0.8);
    backdrop-filter: blur(8px);
    border: none;
    color: #ccc;
    width: 40px;
    height: 40px;
    border-radius: 20px;
    font-size: 18px;
    cursor: pointer;
    display: none;
    z-index: 99;
}
#goTopBtn:hover {
    background: rgba(255,255,255,0.2);
    color: white;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

/* Channel count - minimal */
.channel-stats {
    text-align: center;
    font-size: 11px;
    color: #555;
    padding: 8px 16px;
    letter-spacing: 0.3px;
}

@media (max-width: 640px) {
    .channel-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 8px;
    }
    .channel-card {
        padding: 10px 6px;
    }
    .channel-name {
        font-size: 12px;
    }
    .control-btn {
        width: 36px;
        height: 36px;
        font-size: 16px;
    }
    .custom-controls {
        gap: 8px;
        padding: 6px 14px;
    }
}
</style>
</head>
<body>

<!-- NO HEADER - removed -->

<div class="player-wrapper">
    <div class="player-box">
        <video id="videoPlayer" autoplay playsinline controls></video>
        <div class="custom-controls" id="customControls">
            <button class="control-btn" id="prevBtn">◀</button>
            <button class="control-btn" id="playPauseBtn">▶</button>
            <button class="control-btn" id="nextBtn">▶</button>
        </div>
    </div>
</div>

<div class="search-area">
    <input type="text" id="searchInput" class="search-box" placeholder="Search channels..." autocomplete="off">
</div>

<div class="channel-container">
    <div class="channel-grid" id="channelGrid">
        <div class="status-message">Loading channels<span class="loading-dots"></span></div>
    </div>
</div>

<div id="channelStats" class="channel-stats"></div>

<button id="goTopBtn">↑</button>

<script>
    // M3U LINKS
    const PLAYLIST_URLS = [
        "https://raw.githubusercontent.com/bd257/live/refs/heads/main/aynaott.m3u",
        "https://raw.githubusercontent.com/bd257/live/refs/heads/main/Sports-138.m3u"
    ];

    let masterChannels = [];      
    let filteredChannels = [];
    let currentIndex = 0;
    let currentHls = null;
    let isLoading = false;
    
    // Cache for cards
    let cardCache = new Map();

    // DOM elements
    const video = document.getElementById('videoPlayer');
    const channelGrid = document.getElementById('channelGrid');
    const searchInput = document.getElementById('searchInput');
    const statsSpan = document.getElementById('channelStats');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const topBtn = document.getElementById('goTopBtn');

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getGroupTitle(infoLine) {
        const match = infoLine.match(/group-title="([^"]*)"/i);
        return match ? match[1] : '';
    }

    function parseM3UContent(content, sourceName = '') {
        const lines = content.split(/\r?\n/);
        const channels = [];
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith('#EXTINF')) {
                const infoLine = line;
                const urlLine = (i + 1 < lines.length) ? lines[i + 1].trim() : '';
                if (!urlLine || urlLine.startsWith('#')) continue;
                
                let channelName = 'Unknown';
                const nameMatch = infoLine.match(/,(.+)$/);
                if (nameMatch && nameMatch[1]) channelName = nameMatch[1].trim();
                
                const group = getGroupTitle(infoLine);
                
                if (urlLine.startsWith('http')) {
                    channels.push({
                        name: channelName,
                        url: urlLine,
                        group: group,
                        source: sourceName
                    });
                }
            }
        }
        return channels;
    }

    function getOrCreateCard(channel, isActive) {
        if (cardCache.has(channel.url)) {
            const existingCard = cardCache.get(channel.url);
            if (isActive) existingCard.classList.add('active');
            else existingCard.classList.remove('active');
            return existingCard;
        }
        
        const div = document.createElement('div');
        div.className = 'channel-card';
        if (isActive) div.classList.add('active');
        
        div.innerHTML = `
            <div class="channel-name">${escapeHtml(channel.name)}</div>
            ${channel.group ? `<div class="channel-group">${escapeHtml(channel.group)}</div>` : ''}
        `;
        
        div.addEventListener('click', (e) => {
            e.stopPropagation();
            const realIdx = masterChannels.findIndex(c => c.url === channel.url);
            if (realIdx !== -1) playChannel(realIdx);
        });
        
        cardCache.set(channel.url, div);
        return div;
    }

    function renderChannelGrid() {
        if (!channelGrid) return;
        
        if (filteredChannels.length === 0) {
            channelGrid.innerHTML = `<div class="status-message">No channels found</div>`;
            return;
        }
        
        const activeChannelUrl = masterChannels[currentIndex]?.url;
        const fragment = document.createDocumentFragment();
        
        filteredChannels.forEach((ch) => {
            const isActive = (ch.url === activeChannelUrl);
            const card = getOrCreateCard(ch, isActive);
            fragment.appendChild(card);
        });
        
        channelGrid.innerHTML = '';
        channelGrid.appendChild(fragment);
        
        setTimeout(() => {
            const activeCard = document.querySelector('.channel-card.active');
            if (activeCard) {
                activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }, 80);
    }

    async function loadAllPlaylists() {
        channelGrid.innerHTML = `<div class="status-message">Loading channels<span class="loading-dots"></span></div>`;
        masterChannels = [];
        cardCache.clear();
        
        const fetchPromises = PLAYLIST_URLS.map(async (url, idx) => {
            try {
                const response = await fetch(url + '?t=' + Date.now());
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const text = await response.text();
                const parsed = parseM3UContent(text, idx === 0 ? 'AynaOTT' : 'Sports138');
                console.log(`Loaded ${parsed.length} channels from ${idx === 0 ? 'AynaOTT' : 'Sports-138'}`);
                return parsed;
            } catch (err) {
                console.warn(`Failed to load ${url}:`, err);
                return [];
            }
        });
        
        const results = await Promise.all(fetchPromises);
        masterChannels = results.flat();
        
        const uniqueMap = new Map();
        for (const ch of masterChannels) {
            if (!uniqueMap.has(ch.url)) {
                uniqueMap.set(ch.url, ch);
            }
        }
        masterChannels = Array.from(uniqueMap.values());
        
        if (masterChannels.length === 0) {
            channelGrid.innerHTML = `<div class="status-message">No channels found</div>`;
            statsSpan.innerText = `0 channels`;
            return false;
        }
        
        filteredChannels = [...masterChannels];
        statsSpan.innerText = `${filteredChannels.length} channels`;
        renderChannelGrid();
        if (filteredChannels.length) playChannel(0);
        return true;
    }

    function playChannel(index) {
        if (!masterChannels.length || index < 0 || index >= masterChannels.length) return;
        if (isLoading) return;
        isLoading = true;
        
        currentIndex = index;
        const channel = masterChannels[currentIndex];
        if (!channel || !channel.url) {
            isLoading = false;
            return;
        }
        
        if (currentHls) {
            currentHls.destroy();
            currentHls = null;
        }
        
        const url = channel.url;
        const isHLS = url.includes('.m3u8') || url.includes('m3u8');
        
        document.querySelectorAll('.channel-card').forEach((card) => {
            card.classList.remove('active');
        });
        const activeCard = cardCache.get(channel.url);
        if (activeCard) activeCard.classList.add('active');
        
        if (isHLS && Hls.isSupported()) {
            currentHls = new Hls({ debug: false, enableWorker: true, lowLatencyMode: true });
            currentHls.loadSource(url);
            currentHls.attachMedia(video);
            currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(e => console.log("Auto-play blocked", e));
                isLoading = false;
            });
            currentHls.on(Hls.Events.ERROR, (ev, data) => {
                if (data.fatal) {
                    console.warn("Stream error, skipping...");
                    nextChannel();
                }
                isLoading = false;
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl') && isHLS) {
            video.src = url;
            video.play().catch(e => console.log(e));
            isLoading = false;
        } else {
            video.src = url;
            video.play().catch(e => console.warn("Play error", e));
            isLoading = false;
        }
        
        document.title = `${channel.name} · Live TV`;
    }
    
    function nextChannel() {
        if (!masterChannels.length) return;
        let newIdx = currentIndex + 1;
        if (newIdx >= masterChannels.length) newIdx = 0;
        playChannel(newIdx);
    }
    
    function prevChannel() {
        if (!masterChannels.length) return;
        let newIdx = currentIndex - 1;
        if (newIdx < 0) newIdx = masterChannels.length - 1;
        playChannel(newIdx);
    }
    
    function togglePlayPause() {
        if (video.paused) video.play().catch(e=>console.log);
        else video.pause();
    }
    
    function applySearchFilter() {
        const term = searchInput.value.trim().toLowerCase();
        if (!term) {
            filteredChannels = [...masterChannels];
        } else {
            filteredChannels = masterChannels.filter(ch => 
                ch.name.toLowerCase().includes(term)
            );
        }
        statsSpan.innerText = `${filteredChannels.length} / ${masterChannels.length} channels`;
        renderChannelGrid();
        
        const currentStillVisible = filteredChannels.some(ch => ch.url === masterChannels[currentIndex]?.url);
        if (!currentStillVisible && filteredChannels.length > 0) {
            const newMasterIdx = masterChannels.findIndex(ch => ch.url === filteredChannels[0].url);
            if (newMasterIdx !== -1) playChannel(newMasterIdx);
        }
    }
    
    // Auto-hide controls
    let hideTimeout;
    const controlsDiv = document.getElementById('customControls');
    function resetHideTimer() {
        if (controlsDiv) controlsDiv.style.opacity = '1';
        if (hideTimeout) clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => {
            if (controlsDiv) controlsDiv.style.opacity = '0';
        }, 2000);
    }
    function showControls() { resetHideTimer(); }
    
    // Event listeners
    prevBtn.addEventListener('click', () => { prevChannel(); showControls(); });
    nextBtn.addEventListener('click', () => { nextChannel(); showControls(); });
    playPauseBtn.addEventListener('click', () => { togglePlayPause(); showControls(); });
    document.querySelector('.player-box')?.addEventListener('click', showControls);
    video.addEventListener('play', () => showControls());
    video.addEventListener('pause', () => showControls());
    searchInput.addEventListener('input', () => { applySearchFilter(); showControls(); });
    
    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') { prevChannel(); e.preventDefault(); showControls(); }
        else if (e.key === 'ArrowRight') { nextChannel(); e.preventDefault(); showControls(); }
        else if (e.key === ' ' || e.key === 'Space') { togglePlayPause(); e.preventDefault(); showControls(); }
    });
    
    window.addEventListener('scroll', () => {
        if (window.scrollY > 300) topBtn.style.display = 'flex';
        else topBtn.style.display = 'none';
    });
    topBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    
    loadAllPlaylists();
    resetHideTimer();
    setTimeout(() => { if (controlsDiv) controlsDiv.style.opacity = '0'; }, 3000);
</script>
</body>
</html>
